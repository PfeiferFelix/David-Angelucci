<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESTEEMED videography</title>
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
    <script src="./script.js"></script>
    <script src="./i18n.js" defer></script>
    <script src="./templates.js" defer></script>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./portfolio.css">
</head>
<body>
    <div id="header-placeholder"></div>
    <main>
        <!-- Hero: Portfolio -->
        <section class="portfolio-hero">
            <h1>Portfolio</h1>
            <p class="portfolio-hero-sub" data-i18n="portfolio.subtitle">Eine Auswahl meiner Arbeiten – von cineastischen Reisefilmen bis zu professionellen Unternehmensreels</p>
        </section>

        <!-- Videos -->
        <section class="portfolio-videos">
            <div class="portfolio-video-card" onclick="openVideoModal('vimeo:1182266783:portrait')">
                <div class="portfolio-video-thumb">
                    <div class="portfolio-thumb-img" data-thumb-id="1182266783"></div>
                    <div class="portfolio-play-btn">&#9654;</div>
                </div>
            </div>
            <div class="portfolio-video-card" onclick="openVideoModal('vimeo:1199135317:portrait')">
                <div class="portfolio-video-thumb">
                    <div class="portfolio-thumb-img" data-thumb-id="1199135317"></div>
                    <div class="portfolio-play-btn">&#9654;</div>
                </div>
            </div>
            <div class="portfolio-video-card" onclick="openVideoModal('vimeo:1199135316:landscape')">
                <div class="portfolio-video-thumb">
                    <div class="portfolio-thumb-img" data-thumb-id="1199135316"></div>
                    <div class="portfolio-play-btn">&#9654;</div>
                </div>
            </div>
            <div class="portfolio-video-card" onclick="openVideoModal('vimeo:1184578452:portrait')">
                <div class="portfolio-video-thumb">
                    <div class="portfolio-thumb-img" data-thumb-id="1184578452"></div>
                    <div class="portfolio-play-btn">&#9654;</div>
                </div>
            </div>
<div class="portfolio-video-card" onclick="openVideoModal('vimeo:1202927456:landscape')">
                <div class="portfolio-video-thumb">
                    <div class="portfolio-thumb-img" data-thumb-id="1202927456"></div>
                    <div class="portfolio-play-btn">&#9654;</div>
                </div>
            </div>
            <div class="portfolio-video-card" onclick="openVideoModal('vimeo:1202928447:landscape')">
                <div class="portfolio-video-thumb">
                    <div class="portfolio-thumb-img" data-thumb-id="1202928447"></div>
                    <div class="portfolio-play-btn">&#9654;</div>
                </div>
            </div>
        </section>

    </main>

    <!-- Video Modal -->
    <div class="video-modal" id="videoModal" onclick="closeVideoModal()">
        <div class="video-modal-content" onclick="event.stopPropagation()">
            <button class="video-modal-close" onclick="closeVideoModal()">&#x2715;</button>
            <video id="modalVideo" controls style="display:none;">
                <source id="modalVideoSrc" src="" type="video/mp4">
            </video>
            <div id="modalVimeoWrapper" style="display:none;">
                <iframe id="modalVimeo" src="" frameborder="0"
                    allow="autoplay; fullscreen; picture-in-picture"
                    allowfullscreen></iframe>
            </div>
        </div>
    </div>
    <div id="footer-placeholder"></div>
</body>
</html>
